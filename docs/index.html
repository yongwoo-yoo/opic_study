<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="OPIC 스터디">
  <title>OPIC 스터디</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <button class="back-btn" id="back-btn" style="display:none">‹</button>
      <h1 id="header-title">OPIC 스터디</h1>
    </header>
    <div id="home-view">
      <div class="home-section">
        <div class="due-banner">
          <div>
            <div class="count" id="due-count">…</div>
            <div class="label">오늘 복습할 카드</div>
          </div>
          <button class="study-btn" id="study-btn">복습 시작</button>
        </div>
        <div class="section-title">레슨 목록</div>
        <ul class="lesson-list" id="lesson-list">
          <li class="empty"><p>레슨을 불러오는 중…</p></li>
        </ul>
      </div>
    </div>
    <div id="note-view" style="display:none">
      <div class="note-section">
        <div class="note-summary">
          <h2>핵심 요약</h2>
          <ul id="note-summary-list"></ul>
        </div>
        <div class="key-expressions">
          <h2>핵심 표현</h2>
          <ul class="expr-list" id="expr-list"></ul>
        </div>
        <button class="note-study-btn" id="note-study-btn">이 레슨 카드 복습</button>
      </div>
    </div>
    <div id="flashcard-view" style="display:none">
      <div class="flashcard-section" id="flashcard-container"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
